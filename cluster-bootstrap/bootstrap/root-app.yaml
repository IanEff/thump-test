# Root Application — seeds the entire GitOps tree.
# Applied by install_argocd.sh after substituting https://github.com/IanEff/thump-test.git.
#
# This Application manages the thump-test cluster directory, which in turn
# contains:
#   - infra-set.yaml    (ApplicationSet for all infrastructure)
#   - rook-*.yaml       (individual Applications for Rook Ceph components)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: thump-test-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/IanEff/thump-test.git
    targetRevision: HEAD
    path: applications/clusters/thump-test
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
