apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure-set
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/IanEff/thump-test.git
        revision: HEAD
        files:
          - path: applications/infrastructure/**/config.json
  template:
    metadata:
      name: "{{appName}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/IanEff/thump-test.git
        targetRevision: HEAD
        path: "{{localPath}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        # Same CRD-registration race rook-set.yaml documents (a ServiceMonitor/
        # PrometheusRule losing the race against prometheus-operator-crds, or
        # a rook-ceph-namespaced resource losing the race against rook-cluster):
        # ceph-latency-bridge ships a ServiceMonitor and has hit exactly this.
        # selfHeal:true alone doesn't help — it only corrects drift on an
        # already-synced app, it doesn't retry an abandoned initial sync.
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
