# CephCluster CR — most conservative sync policy in the repo.
# prune: false     — NEVER auto-delete the cluster CR
# selfHeal: false  — don't fight the operator if it patches the live CR
#
# To update: edit cephcluster.yaml + manually sync in ArgoCD UI,
# or: argocd app sync rook-cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  project: default
  source:
    repoURL: https://github.com/IanEff/thump-test.git
    targetRevision: HEAD
    path: applications/rook/cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: rook-ceph
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    # CephCluster CRD (installed by rook-operator, wave 20) sometimes isn't
    # Established yet when this app's wave-25 sync fires — same race
    # rook-set.yaml documents for PrometheusRule/ServiceMonitor CRDs.
    # ArgoCD's bare default retry (limit 5, ~2.5m window) isn't enough
    # margin and there's no selfHeal here to correct it after the fact:
    # once retries exhaust for a revision, ArgoCD gives up permanently and
    # the CephCluster CR is simply never created. Match rook-set's longer
    # backoff so the initial sync survives the CRD-registration race.
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    # The Rook operator updates these fields — don't flag as drift
    - group: ceph.rook.io
      kind: CephCluster
      jsonPointers:
        - /status
        - /spec/mon/count
