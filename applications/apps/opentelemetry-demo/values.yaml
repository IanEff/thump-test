# Values for the open-telemetry/opentelemetry-demo chart, modeled on
# ~/projects/infra/learning/Observability-with-Grafana/OTEL-Demo.yaml (that
# reference predates this chart's `opensearch` dependency — verified live
# against this exact chart version's values.yaml/Chart.yaml before trusting
# it; opensearch.enabled defaults to true and had to be added here).
#
# Point the demo's OTLP exporters at the rig's existing collector instead of
# the chart's own bundled one (disabled below) — that collector now carries
# both the traces pipeline (Wave 1) and the Prometheus metrics pipeline
# (Wave 2), so no further collector-side work is needed for demo telemetry
# to land in Tempo + Prometheus.
default:
  envOverrides:
    # NOT "otel-collector" -- caught live via NXDOMAIN from inside the
    # cluster. The otel-collector Application's Helm releaseName
    # ("otel-collector") doesn't contain the chart name
    # ("opentelemetry-collector"), so the chart's fullname template falls
    # back to "<release>-<chart>" instead of just "<release>". Confirmed
    # via `kubectl get svc -n tracing`: the real Service is
    # otel-collector-opentelemetry-collector. The Wave 2 handoff doc's own
    # "point the demo at otel-collector.tracing.svc.cluster.local" note was
    # never actually checked against the live Service name -- it was wrong.
    - name: OTEL_COLLECTOR_NAME
      value: otel-collector-opentelemetry-collector.tracing.svc.cluster.local

# Bundled dependency subcharts — all disabled, replaced by the rig's own
# tracing/monitoring stack (otel-collector, tempo, prometheus, grafana).
opentelemetry-collector:
  enabled: false

jaeger:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false

# Not in the reference values file (added to the chart after it was
# written) — confirmed via Chart.yaml's dependencies list + values.yaml's
# own `opensearch.enabled: true` default (1100Mi memory limit). Only
# consumed by the collector's log-export pipeline and the grafana
# opensearch datasource, both already disabled above, so this has no
# in-cluster consumer left once those two are off. Loki already covers logs
# for this rig.
opensearch:
  enabled: false

# Wave 3 demo trim (see README.md's "OTel demo trim" section for the full
# call-graph rationale): keep the connected core shopping path + the
# services covering the CLAUDE.md §10 flagd-flag picks, disable true leaves.
#
# postgresql stays enabled (chart default) even though it was only ever
# meant to back the disabled product-reviews/accounting components — caught
# live in Phase 5 verification: product-catalog itself (a flag target, not
# a leaf) also has a hard DB_CONNECTION_STRING dependency on postgresql in
# this chart version (2.2.0 stores the catalog in Postgres, not a static
# file like older versions). Without it product-catalog crash-loops
# instantly (empty logs, exit 1) with no indication in values.yaml alone —
# only found by watching `kubectl get pods -n otel-demo` after a live sync,
# exactly the kind of thing CLAUDE.md's "verify live, don't assume" rule is
# for. accounting/product-reviews/llm stay disabled; postgresql just also
# serves product-catalog now.
components:
  accounting:
    enabled: false
  fraud-detection:
    enabled: false
  product-reviews:
    enabled: false
  llm:
    enabled: false
  # flagd: read the flagd-config ConfigMap DIRECTLY instead of the chart's
  # default "init container copies ConfigMap into a config-rw emptyDir, flagd
  # reads the emptyDir" pattern. Why: the chaos scripts (and thump's actuator)
  # flip a flag by patching that ConfigMap at runtime, and we need flagd to
  # hot-reload IN PLACE so it pushes the change over consumers' live flag
  # streams. The default pattern can't do that -- a ConfigMap patch never
  # reaches the emptyDir copy, and restarting flagd to force a re-copy severs
  # every consumer's stream, leaving them stale (verified live: product-catalog
  # kept serving HTTP 200 on the failing product until it too was restarted).
  # Mounting the ConfigMap directly lets flagd's file watcher pick up the
  # kubelet's ConfigMap update and push it out with no restart anywhere.
  #
  # null (NOT []) is required to drop the chart-default lists: Helm coalesce
  # silently ignores an empty list override but honors null as "remove key".
  flagd:
    mountedConfigMaps:
      - name: config-ro
        mountPath: /etc/flagd
        existingConfigMap: flagd-config
    mountedEmptyDirs: null   # drop config-rw (the emptyDir flagd used to read)
    initContainers: null     # drop the ConfigMap->emptyDir copy step
    additionalVolumes: null  # drop the now-redundant config-ro volume def
    sidecarContainers: null  # drop flagd-ui (wrote to the emptyDir; moot now, frees 250Mi)
