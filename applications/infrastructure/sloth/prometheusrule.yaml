        - alert: CartAvailabilitySLO
          annotations:
            summary: '{{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget burn rate is over expected.'
            title: (ticket) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget burn rate is too fast.
          expr: |
            (
                max(slo:sli_error:ratio_rate2h{sloth_id="cart-availability", sloth_service="cart", sloth_slo="availability"} > (3 * 0.01)) without (sloth_window)
                and
                max(slo:sli_error:ratio_rate1d{sloth_id="cart-availability", sloth_service="cart", sloth_slo="availability"} > (3 * 0.01)) without (sloth_window)
            )
            or
            (
                max(slo:sli_error:ratio_rate6h{sloth_id="cart-availability", sloth_service="cart", sloth_slo="availability"} > (1 * 0.01)) without (sloth_window)
                and
                max(slo:sli_error:ratio_rate3d{sloth_id="cart-availability", sloth_service="cart", sloth_slo="availability"} > (1 * 0.01)) without (sloth_window)
            )
          labels:
            severity: warning
            sloth_severity: ticket
