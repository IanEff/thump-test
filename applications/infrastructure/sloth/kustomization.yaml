apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

# Only the generated PrometheusRule is deployed — the Sloth runtime
# Deployment/CRDs (vendored under charts/sloth-0.16.0/ for the `sloth`
# CLI's own use) are not installed; prometheusservicelevels.yaml is a
# build-time-only input to `just gen-slos`, never applied to the cluster.
resources:
  - prometheusrule.yaml
