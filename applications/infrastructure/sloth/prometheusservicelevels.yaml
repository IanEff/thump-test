# BUILD-TIME SPEC, NOT A LIVE K8S OBJECT — the Sloth runtime chart (and its
# CRDs) are still retired from this cluster: no live Sloth controller runs,
# so this CRD-shaped YAML is only an input to `sloth generate`
# (provisioning/scripts/gen_slos.sh / `just gen-slos`), which renders it to a
# real PrometheusRule CR (applications/infrastructure/sloth/prometheusrule.yaml)
# that the Prometheus Operator (kube-prometheus-stack, wave -5) actually
# watches and loads — no controller needed for that part, just the CRD
# (installed by prometheus-operator-crds, wave -6) and the Operator's own
# reconciliation of the Prometheus CR's ruleSelector. Edit this file, run
# `just gen-slos`, commit both.
#
# sloth_id is NOT metadata.name — Sloth computes it as "{spec.service}-{slo.name}"
# (confirmed against sloth/internal/storage/io/k8s_sloth.go). service/name below
# are chosen so the concatenation matches rattle's SLO.ID exactly, per the
# design doc's Integration Contract:
#   ceph-rgw-availability = service "ceph-rgw"  + name "availability"
#   ceph-rgw-saturation   = service "ceph-rgw"  + name "saturation"
#   ceph-osd-latency      = service "ceph-osd"  + name "latency"
#   ceph-health           = service "ceph"      + name "health"
#   ceph-redundancy       = service "ceph"      + name "redundancy"
#   argocd-sync           = service "argocd"    + name "sync"
apiVersion: sloth.slok.dev/v1
kind: PrometheusServiceLevel
metadata:
  name: ceph-rgw-availability
  namespace: monitoring
spec:
  service: ceph-rgw
  labels:
    lab: thump-test
  slos:
    - name: availability
      objective: 99.9
      description: >-
        99.9% of RGW requests succeed. Backed by the Ceph mgr's own RGW perf
        counters (ceph_rgw_req/ceph_rgw_failed_req), already scraped via the
        rook-ceph-mgr Prometheus job. Only populates once RGW has served at
        least one request — trigger applications/infrastructure/s3-traffic-generator
        (kubectl exec ... -- /start-traffic.sh) to seed data.
      sli:
        events:
          errorQuery: sum(rate(ceph_rgw_failed_req[{{.window}}]))
          totalQuery: sum(rate(ceph_rgw_req[{{.window}}]))
      alerting:
        name: CephRGWAvailabilitySLO
        labels:
          severity: critical
        pageAlert:
          labels:
            severity: critical
        ticketAlert:
          labels:
            severity: warning
---
apiVersion: sloth.slok.dev/v1
kind: PrometheusServiceLevel
metadata:
  name: ceph-rgw-saturation
  namespace: monitoring
spec:
  service: ceph-rgw
  labels:
    lab: thump-test
  slos:
    - name: saturation
      objective: 99
      description: >-
        99% of the time RGW's own GET+PUT op latency (ceph_rgw_op_get_obj_lat
        / ceph_rgw_op_put_obj_lat, the RGW perf-counter AvgTime pair scraped
        alongside ceph_rgw_req/ceph_rgw_failed_req via the same rook-ceph-mgr
        job — no separate exporter needed, unlike ceph-osd-latency's
        ceph-latency-bridge bridge) stays under 150ms. Exists to close the
        gap phase-e-earn-the-ceiling-guide's Part 2 D2 crux identified: the
        availability SLO (ceph_rgw_failed_req, abort_early()-only, see
        rgw-failure-injection.md) structurally cannot see a backend-slow-under-
        load dependency_saturation shape — every mechanism that isn't a
        pre-execution rejection (PG-starve, network delay/loss on RGW) leaves
        failed_req untouched but does move this counter. RAW SLI, not an
        event ratio (RGW exposes AvgTime sum/count, not a latency histogram
        the way OSD's perf-histogram-dump-derived bridge does) — but NOT the
        original "avg_latency / threshold, clamp_max 1" shape either. Like
        ceph-rgw-availability, only populates once RGW has served at least
        one GET or PUT (division by zero otherwise) — seed with
        applications/infrastructure/s3-traffic-generator.
        METRIC NAMES VERIFIED LIVE 2026-07-14 against thump-test's real scrape
        (`curl -s "$PROM_URL/api/v1/label/__name__/values" | grep
        rgw_.*lat`): RGW's actual perf-counter names on this cluster
        (ceph v19.2.3) are ceph_rgw_op_get_obj_lat_sum/_count and
        ceph_rgw_op_put_obj_lat_sum/_count — NOT the rgw_l_get_initial_lat /
        rgw_l_put_initial_lat names this SLO originally guessed from
        rgw_perf_counters.cc (those don't exist on this scrape at all; the
        per-op op_*_lat counters are the ones actually exported).
        SLI SHAPE CORRECTED 2026-07-14: the original errorRatioQuery
        (`(latency/0.1) clamp_max 1`) fed the raw latency-to-threshold ratio
        directly into Sloth's burn-rate math, which treats errorRatioQuery
        as if it WERE the error fraction — dividing by the 1% (99%
        objective) error budget. That's not a fraction of anything; it's a
        continuous "how close to the ceiling" number, so it always over-
        burns unless the threshold is set >100x baseline latency (verified
        live: healthy baseline was 14-17ms blended, and burn_rate read 17.3
        — 17x over budget — with HEALTH_OK and zero real degradation;
        ceph-health/ceph-osd-latency both read exactly 0 at the same
        baseline for comparison). Fixed by making the SLI a real 0-1
        fraction: "what fraction of the window was latency over the line,"
        not "how far over the line is the current average." Threshold
        bumped 100ms->150ms in the same pass (~9x the observed 14-17ms
        baseline, real headroom against jitter) — but the ratio-shape fix
        is what actually matters; the old shape would still misfire at any
        threshold under ~1.7s (baseline * 100, from the 1% budget math).
      sli:
        raw:
          errorRatioQuery: >-
            avg_over_time(
              (
                (
                  (sum(rate(ceph_rgw_op_get_obj_lat_sum[1m])) + sum(rate(ceph_rgw_op_put_obj_lat_sum[1m])))
                  /
                  (sum(rate(ceph_rgw_op_get_obj_lat_count[1m])) + sum(rate(ceph_rgw_op_put_obj_lat_count[1m])))
                ) > bool 0.15
              )[{{.window}}:1m]
            )
      alerting:
        name: CephRGWSaturationSLO
        labels:
          severity: critical
        pageAlert:
          labels:
            severity: critical
        ticketAlert:
          labels:
            severity: warning
---
apiVersion: sloth.slok.dev/v1
kind: PrometheusServiceLevel
metadata:
  name: ceph-osd-latency
  namespace: monitoring
spec:
  service: ceph-osd
  labels:
    lab: thump-test
  slos:
    - name: latency
      objective: 99
      description: >-
        99% of OSD writes complete under 100ms. Supersedes the hand-rolled
        elk-slo-dashboard burn-rate rule (same underlying metrics) — see
        applications/infrastructure/elk-slo-dashboard's removal in this same
        change.
        VERIFIED LIVE 2026-07-03 (see docs/ceph-lab-running-notes F4): the
        le="0.049999" guess was wrong — ceph_osd_op_w_latency_bucket has no
        50ms bucket. provisioning/scripts/ceph_latency_exporter.py's 2x
        ladder starts at le="0.099999" (99999us, not 100000us), same as
        mach-2's existing read-latency SLO. Objective corrected from
        "<50ms" to "<100ms" to match the actual bucket boundary.
      sli:
        events:
          totalQuery: sum(rate(ceph_osd_op_w_latency_count{job="ceph-latency-bridge"}[{{.window}}]))
          errorQuery: >-
            sum(rate(ceph_osd_op_w_latency_count{job="ceph-latency-bridge"}[{{.window}}]))
            - sum(rate(ceph_osd_op_w_latency_bucket{job="ceph-latency-bridge",le="102.399999"}[{{.window}}]))
      alerting:
        name: CephOSDLatencySLO
        labels:
          severity: critical
        pageAlert:
          labels:
            severity: critical
        ticketAlert:
          labels:
            severity: warning
---
apiVersion: sloth.slok.dev/v1
kind: PrometheusServiceLevel
metadata:
  name: ceph-health
  namespace: monitoring
spec:
  service: ceph
  labels:
    lab: thump-test
  slos:
    - name: health
      objective: 99.9
      description: >-
        99.9% of the time ceph_health_status reports OK (0). WARN (1) and
        ERR (2) both count as a violation for this window (clamped to 1).
      sli:
        raw:
          errorRatioQuery: max(avg_over_time(clamp_max(ceph_health_status, 1)[{{.window}}:1m]))
      alerting:
        name: CephHealthSLO
        labels:
          severity: critical
        pageAlert:
          labels:
            severity: critical
        ticketAlert:
          labels:
            severity: warning
---
apiVersion: sloth.slok.dev/v1
kind: PrometheusServiceLevel
metadata:
  name: argocd-sync
  namespace: monitoring
spec:
  service: argocd
  labels:
    lab: thump-test
  slos:
    - name: sync
      objective: 99
      description: >-
        99% of the time all ArgoCD Applications report Synced. Depends on the
        argocd-metrics scrape job added to
        applications/infrastructure/prometheus/values.yaml in this same
        change — argocd_app_info does not exist in Prometheus without it.
        EXECUTION-TIME CHECKPOINT: confirm argocd_app_info's sync_status label
        spelling against a live query once scraped; the vendored ArgoCD
        install manifest (cluster-bootstrap/argocd/) is the source of truth
        for the metric's actual shape at whatever "stable" resolved to when
        this landed.
      sli:
        raw:
          errorRatioQuery: >-
            avg_over_time((count(argocd_app_info{sync_status!="Synced"}) or vector(0))[{{.window}}:1m])
            /
            avg_over_time(count(argocd_app_info)[{{.window}}:1m])
      alerting:
        name: ArgoCDSyncSLO
        labels:
          severity: critical
        pageAlert:
          labels:
            severity: critical
        ticketAlert:
          labels:
            severity: warning
---
apiVersion: sloth.slok.dev/v1
kind: PrometheusServiceLevel
metadata:
  name: ceph-redundancy
  namespace: monitoring
spec:
  service: ceph
  labels:
    lab: thump-test
  slos:
    - name: redundancy
      objective: 99.9
      description: >-
        99.9% of the time every placement group is at full replication — no
        PG degraded or undersized. A degraded/undersized PG means stored data
        is below its configured replica count and at elevated loss risk until
        recovery restores it: a durability failure distinct from capacity
        (ceph-health/fullness) and from RGW request health. The SLI is a real
        0-1 fraction — "what fraction of the window had any degraded or
        undersized PG" — not a raw count fed into burn math, so it can't
        over-burn the way an unbounded count would (same shape as ceph-health's
        clamp_max fraction, not ceph-rgw-saturation's original ratio bug).
        METRIC NAMES VERIFIED LIVE 2026-07-16 against thump-test's real scrape
        (`curl -sG .../api/v1/query --data-urlencode query=ceph_pg_degraded`):
        ceph_pg_degraded and ceph_pg_undersized are both exported by the
        rook-ceph-mgr job, labeled per pool_id, and both read 0 on the healthy
        cluster; sum() aggregates across pools. `or vector(0)` guards the
        window where the mgr briefly exports no PG series at all (e.g. an mgr
        restart), same defensiveness as the argocd-sync SLO above.
      sli:
        raw:
          errorRatioQuery: >-
            avg_over_time(
              clamp_max(
                (sum(ceph_pg_degraded) or vector(0)) + (sum(ceph_pg_undersized) or vector(0)),
                1
              )[{{.window}}:1m]
            )
      alerting:
        name: CephRedundancySLO
        labels:
          severity: critical
        pageAlert:
          labels:
            severity: critical
        ticketAlert:
          labels:
            severity: warning
---
# ─────────────────────────────────────────────────────────────────────────────
# OTel demo SLOs (Wave 5) — the second, Ceph-orthogonal domain. Each is backed
# by one armed flagd chaos flag (chaos/flag-*.sh) whose ON = inject / OFF = fix,
# so every burn is cleanly reversible by the same switch thump will flip.
# METRIC NAMES VERIFIED LIVE 2026-07-19 against thump-test's real scrape
# (`curl .../api/v1/label/__name__/values` + `.../api/v1/series`): the OTel
# demo exports app_frontend_requests_total{target,status} (the frontend's own
# per-route request counter) — the OTLP→prometheus exporter did NOT rename it.
# One orthogonal SLO per service, no catch-all frontend SLO: the Wave-3 trim
# leaves product-reviews/llm disabled while the frontend still calls
# /api/product-reviews/* and /api/product-ask-ai-assistant/*, so those 500
# CONSTANTLY at baseline — a frontend-wide error rate would burn with no chaos.
# Scope is therefore per-target (see demo-chaos-signals notes).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: sloth.slok.dev/v1
kind: PrometheusServiceLevel
metadata:
  name: product-catalog-availability
  namespace: monitoring
spec:
  service: product-catalog
  labels:
    lab: thump-test
    domain: otel-demo
  slos:
    - name: availability
      objective: 99
      description: >-
        99% of product-detail requests for the chaos-target product succeed.
        Backed by the frontend's own app_frontend_requests_total counter,
        scoped to target="/api/products/OLJCESPC7Z" — the exact product id the
        productCatalogFailure flag makes GetProduct error on (verified live in
        Wave 4: flag ON → HTTP 500 on that target at ~t+40s, a control product
        stays 200). Scoped to the single fault target on purpose: the fault
        only errors that one id, so a wider /api/products.* scope would dilute
        the burn with all the still-200 products. Events-ratio SLI (real
        error-events / total-events fraction, the proven ceph-rgw-availability
        shape) — not a raw ratio fed into burn math. Only populates while the
        loadgenerator is browsing that product; baseline error rate is 0.
        Chaos: chaos/flag-product-catalog-on.sh / -off.sh (productCatalogFailure).
      sli:
        events:
          errorQuery: sum(rate(app_frontend_requests_total{target="/api/products/OLJCESPC7Z",status="500"}[{{.window}}]))
          totalQuery: sum(rate(app_frontend_requests_total{target="/api/products/OLJCESPC7Z"}[{{.window}}]))
      alerting:
        name: ProductCatalogAvailabilitySLO
        labels:
          severity: critical
        pageAlert:
          labels:
            severity: critical
        ticketAlert:
          labels:
            severity: warning
---
apiVersion: sloth.slok.dev/v1
kind: PrometheusServiceLevel
metadata:
  name: cart-availability
  namespace: monitoring
spec:
  service: cart
  labels:
    lab: thump-test
    domain: otel-demo
  slos:
    - name: availability
      objective: 99
      description: >-
        99% of cart-service RPCs succeed, measured from the checkout service's
        gRPC client to oteldemo.CartService (rpc_grpc_status_code != "0" = an
        errored call). SIGNAL CORRECTED 2026-07-19 after live verification: the
        cartFailure flag does NOT surface as a frontend HTTP 500 — the frontend's
        GET /api/cart tolerates the fault (stays 200), so the original
        app_frontend_requests_total{target="/api/cart"} scope never burned under
        chaos. What the flag actually breaks is cart's EmptyCart RPC (returns
        gRPC status 9 FAILED_PRECONDITION), and the only in-cluster view of
        cart's own RPC health is its CALLER: checkout emits
        rpc_client_duration_milliseconds{rpc_service="oteldemo.CartService"} with
        an rpc_grpc_status_code label (the cart .NET service itself emits no
        rpc_server_duration, and the frontend emits no rpc_client series — only
        checkout does). Verified live: baseline error ratio 0 (all status 0),
        cartFailure ON → EmptyCart status 9 → ratio ~0.4-0.5. Events-ratio SLI,
        same shape as product-catalog-availability. This is also the ranker's
        two-eligible-action case: cartFailure is remediable by either restart-pod
        OR disable-flag, but only the flag flip actually clears it (the fault is
        flag state, not pod state), so thump must prefer the reversible flag
        action. Chaos: chaos/flag-cart-on.sh / -off.sh (cartFailure).
      sli:
        events:
          errorQuery: sum(rate(rpc_client_duration_milliseconds_count{service_name="checkout",rpc_service="oteldemo.CartService",rpc_grpc_status_code!="0"}[{{.window}}]))
          totalQuery: sum(rate(rpc_client_duration_milliseconds_count{service_name="checkout",rpc_service="oteldemo.CartService"}[{{.window}}]))
      alerting:
        name: CartAvailabilitySLO
        labels:
          severity: critical
        pageAlert:
          labels:
            severity: critical
        ticketAlert:
          labels:
            severity: warning
