apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

# Installs the Prometheus Operator CRDs (ServiceMonitor, PrometheusRule,
# PodMonitor, etc.), owned by this app alone — applications/infrastructure/
# prometheus/values.yaml sets crds.enabled: false so kube-prometheus-stack's
# own bundled CRDs subchart never fights this app over the same resources.
# Must deploy before wave -5 (prometheus, cilium, sloth) so CRDs exist when
# those apps' ServiceMonitor/PrometheusRule CRs and the operator itself land.
# Version bumped 28.0.1 -> 30.0.1 to track kube-prometheus-stack 87.15.2's
# operator (appVersion v0.92.1).
# Force ArgoCD to use Replace (not SSA) for these CRDs — the schemas are too
# large for SSA's OpenAPI download to complete within the request timeout.
commonAnnotations:
  argocd.argoproj.io/sync-options: Replace=true

helmCharts:
  - name: prometheus-operator-crds
    repo: https://prometheus-community.github.io/helm-charts
    version: "30.0.1"
    releaseName: prometheus-operator-crds
    namespace: monitoring
