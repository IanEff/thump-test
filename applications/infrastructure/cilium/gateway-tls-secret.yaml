# Static self-signed wildcard TLS cert for *.thump-test.lab — consumed by the
# Cilium Gateway HTTPS listener. Generated once; 10-year validity.
# CLI uses --insecure so no host-OS trust is needed. No IP SAN — the
# control-plane's public IP is only known after `tofu apply` (see gitops.env),
# and every client here already connects --insecure, so an exact IP SAN
# isn't load-bearing; DNS names are what matter and those are static.
#
# To regenerate:
#   openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 -days 3650 -nodes \
#     -subj "/CN=thump-test.lab" \
#     -addext "subjectAltName=DNS:thump-test.lab,DNS:*.thump-test.lab" \
#     -keyout gw.key -out gw.crt
#   kubectl create secret tls gateway-tls -n kube-system --cert=gw.crt --key=gw.key --dry-run=client -o yaml
apiVersion: v1
kind: Secret
metadata:
  name: gateway-tls
  namespace: kube-system
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
