kubeProxyReplacement: true
# tunnel (VXLAN), not native — unlike ceph-lab's Lima network, which is a
# real L2 segment where autoDirectNodeRoutes + a kernel route is enough for
# cross-node pod delivery. GCP's VPC is routed at Google's SDN layer: a
# packet only gets delivered to a node if there's a matching VPC route
# (google_compute_route) for its destination CIDR, and this repo's Tofu
# creates none (Cilium's per-node pod-CIDR slice from cluster-pool IPAM is
# decided at runtime, not something Tofu can pre-declare a route for).
# Verified directly via `cilium-dbg status --verbose`: host-to-host traffic
# (10.10.0.x) was fine, but EVERY cross-node pod-to-pod probe (10.244.x.x)
# timed out — native routing's node-level route never reaches GCP's actual
# routing table. Tunnel mode sidesteps this entirely: pod traffic rides
# inside a UDP/VXLAN packet between real node IPs, which GCP already knows
# how to route, so no can_ip_forward/custom routes are needed. Hubble is
# unaffected either way — it instruments flows via eBPF at the pod
# veth/socket layer, before encapsulation.
routingMode: tunnel

bpf:
  masquerade: true

datapathMode: netkit
# GCE Ubuntu images use predictable ("ens*") interface naming; some images
# still present "eth0". Match both rather than guessing one.
devices:
  - eth+
  - ens+

loadBalancer:
  mode: snat
  algorithm: maglev
  acceleration: best-effort

# No lbIPAM / l2announcements here (unlike ceph-lab's Lima host-only network,
# GCP's routed VPC has no ARP broadcast domain for Cilium to answer on).
# gatewayAPI.hostNetwork below makes Envoy bind directly to the control-plane
# node's own ports 80/443/4245 instead of requesting a floating LB IP.
gatewayAPI:
  enabled: true
  hostNetwork:
    enabled: true
    # Pin the Envoy hostNetwork pod to the control-plane node only — it's the
    # only node whose IP is reserved/static and known ahead of time (gitops.env
    # CONTROL_PLANE_IP / DNS). An empty selector would let it land on any
    # node's IP, which would silently break the fixed hostname->IP mapping.
    nodeLabelSelector:
      matchLabels:
        node-role.kubernetes.io/control-plane: "true"

# Required for gatewayAPI.hostNetwork above to actually work: binding ports
# 80/443 on the HOST network namespace needs CAP_NET_BIND_SERVICE (the envoy
# process isn't root), and the chart's own comment on
# envoy.securityContext.capabilities warns that "the cilium-envoy-starter
# wrapper drops all capabilities after forking the actual Envoy process"
# unless keepCapNetBindService is also set — granting the capability to the
# container alone isn't enough. Without both, every cilium-envoy pod on every
# node (not just the one gatewayAPI.hostNetwork.nodeLabelSelector pins the
# Gateway to — the capability gap applies to the shared per-node Envoy
# DaemonSet regardless of node) fails identically:
# `listener 'kube-system/cilium-gateway-cilium-gateway/listener' failed to
# bind or apply socket options: cannot bind '0.0.0.0:80': Permission denied`,
# retried in a tight ~15s loop forever — confirmed directly in cilium-envoy's
# own logs on all 4 nodes, including the control-plane. Must list NET_ADMIN
# and SYS_ADMIN explicitly too (not just NET_BIND_SERVICE): Helm merges this
# list by full replacement, not by appending, so omitting them would silently
# drop capabilities the chart's default already required.
envoy:
  securityContext:
    capabilities:
      envoy:
        - NET_ADMIN
        - SYS_ADMIN
        - NET_BIND_SERVICE
      keepCapNetBindService: true

ipam:
  operator:
    clusterPoolIPv4PodCIDRList: ["10.244.0.0/16"]

operator:
  replicas: 1
  dashboards:
    enabled: false

hubble:
  enabled: true
  metrics:
    enabled:
      - dns
      - drop
      # tcp/flow carry destination_workload so non-HTTP traffic (Ceph's binary
      # msgr2 protocol between OSDs) is attributable per-destination — needed
      # for a future HubbleTrafficSource blast-radius query. Previously only
      # httpV2 had labelsContext, so OSD-pool traffic had zero destination
      # attribution.
      - "tcp:labelsContext=source_namespace,source_workload,destination_namespace,destination_workload"
      - "flow:labelsContext=source_namespace,source_workload,destination_namespace,destination_workload"
      - icmp
      - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"
    # Dashboard ConfigMaps exceed the 262 KB annotation limit; disabled to
    # unblock ArgoCD sync. Re-enable once a server-side-aware Grafana sidecar
    # workflow is in place.
    dashboards:
      enabled: false
    serviceMonitor:
      # Disabled at bootstrap; enabled once Prometheus CRDs are established
      enabled: false
  relay:
    enabled: true
  ui:
    enabled: true

dashboards:
  enabled: false
