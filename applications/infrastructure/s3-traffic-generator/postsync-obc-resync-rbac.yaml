# ServiceAccount + RBAC for the wave-40 PostSync ObjectBucketClaim resync
# nudge Job. Same pattern as applications/rook/cluster/postsync-ceph-health-rbac.yaml.
# Not annotated as a hook — these are regular sync resources that persist,
# ensuring the SA exists before the Job hook tries to use it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: obc-resync
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: obc-resync
  namespace: default
rules:
  - apiGroups: ["objectbucket.io"]
    resources: ["objectbucketclaims"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: obc-resync
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: obc-resync
subjects:
  - kind: ServiceAccount
    name: obc-resync
    namespace: default
