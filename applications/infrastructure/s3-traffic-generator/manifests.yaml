# Object Bucket Claim — creates the bucket and a Secret with credentials
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: traffic-generator-bucket
  namespace: default
spec:
  generateBucketName: traffic-gen
  storageClassName: rook-ceph-bucket
---
# Traffic Generator — waits for manual activation via kubectl exec
apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3-traffic-generator
  namespace: default
  labels:
    app: s3-traffic-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s3-traffic-generator
  template:
    metadata:
      labels:
        app: s3-traffic-generator
    spec:
      containers:
        - name: traffic-gen
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for bucket credentials..."
              until [ -f /s3/AWS_ACCESS_KEY_ID ]; do sleep 2; done

              echo "Installing Python OpenTelemetry dependencies..."
              pip install --no-cache-dir boto3 opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp opentelemetry-instrumentation-botocore

              # Write the Python script with indentation
              cat <<'EOF' > /start-traffic.py
              import os
              import socket
              import sys
              import time
              import uuid
              import boto3
              from opentelemetry import trace
              from opentelemetry.sdk.trace import TracerProvider
              from opentelemetry.sdk.trace.export import BatchSpanProcessor
              from opentelemetry.sdk.resources import Resource
              from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter
              from opentelemetry.instrumentation.botocore import BotocoreInstrumentor

              # Initialize OpenTelemetry
              resource = Resource(attributes={"service.name": "s3-traffic-generator"})
              provider = TracerProvider(resource=resource)
              processor = BatchSpanProcessor(OTLPSpanExporter(endpoint="otel-collector-opentelemetry-collector.tracing.svc.cluster.local:4317", insecure=True))
              provider.add_span_processor(processor)
              trace.set_tracer_provider(provider)

              # Auto-instrument botocore (S3 client calls)
              BotocoreInstrumentor().instrument()

              tracer = trace.get_tracer(__name__)

              # Read S3 credentials
              with open('/s3/AWS_ACCESS_KEY_ID', 'r') as f:
                  aws_access_key = f.read().strip()
              with open('/s3/AWS_SECRET_ACCESS_KEY', 'r') as f:
                  aws_secret_key = f.read().strip()
              with open('/s3/BUCKET_HOST', 'r') as f:
                  bucket_host = f.read().strip()
              with open('/s3/BUCKET_PORT', 'r') as f:
                  bucket_port = f.read().strip()
              with open('/s3/BUCKET_NAME', 'r') as f:
                  bucket_name = f.read().strip()

              s3_endpoint = f"http://{bucket_host}:{bucket_port}"
              pod_name = socket.gethostname()

              print(f"[{pod_name}] Connecting to S3 at {s3_endpoint} on bucket {bucket_name}...", flush=True)
              s3 = boto3.client(
                  's3',
                  endpoint_url=s3_endpoint,
                  aws_access_key_id=aws_access_key,
                  aws_secret_access_key=aws_secret_key
              )

              print(f"[{pod_name}] Starting S3 traffic generation loop...", flush=True)
              iteration = 0
              while True:
                  iteration += 1
                  with tracer.start_as_current_span("traffic-iteration") as parent_span:
                      try:
                          # 1. Write objects
                          uploaded_keys = []
                          for i in range(10):
                              key = f"load-test-{int(time.time())}-{uuid.uuid4().hex[:6]}.txt"
                              with tracer.start_as_current_span("s3-upload-file") as upload_span:
                                  s3.put_object(Bucket=bucket_name, Key=key, Body=b"A"*1024)
                                  uploaded_keys.append(key)
                          print(f"[{pod_name}] iteration {iteration}: uploaded {len(uploaded_keys)} objects", flush=True)

                          # 2. List objects
                          with tracer.start_as_current_span("s3-list-objects") as list_span:
                              response = s3.list_objects_v2(Bucket=bucket_name)
                              contents = response.get('Contents', [])
                              print(f"[{pod_name}] iteration {iteration}: listed {len(contents)} objects in bucket", flush=True)

                          time.sleep(5)

                          # 3. Clean up uploaded files
                          for key in uploaded_keys:
                              with tracer.start_as_current_span("s3-delete-object") as delete_span:
                                  s3.delete_object(Bucket=bucket_name, Key=key)
                          print(f"[{pod_name}] iteration {iteration}: cleaned up {len(uploaded_keys)} objects", flush=True)

                          time.sleep(2)
                      except Exception as e:
                          print(f"[{pod_name}] iteration {iteration}: ERROR: {e}", file=sys.stderr, flush=True)
                          time.sleep(5)
              EOF

              # Create the shell helper wrapper. Guards against stacking a second
              # traffic loop on top of one already running (e.g. a repeated
              # `just generate-traffic` invocation hitting a pod that was already
              # scaled up) by checking a pidfile before starting.
              cat <<'EOF' > /start-traffic.sh
              #!/bin/sh
              if [ -f /tmp/traffic.pid ] && [ -d "/proc/$(cat /tmp/traffic.pid)" ]; then
                echo "traffic loop already running (pid $(cat /tmp/traffic.pid)), not starting another" >&2
                exit 0
              fi
              echo $$ > /tmp/traffic.pid
              exec python3 -u /start-traffic.py
              EOF

              chmod +x /start-traffic.sh
              echo "✅ Environment ready. To start traffic, run:"
              echo "   kubectl exec -it $(hostname) -- /start-traffic.sh"
              
              # Sleep forever waiting for user
              tail -f /dev/null
          volumeMounts:
            - name: s3-creds
              mountPath: /s3
              readOnly: true
      volumes:
        - name: s3-creds
          projected:
            sources:
              - configMap:
                  name: traffic-generator-bucket
              - secret:
                  name: traffic-generator-bucket
