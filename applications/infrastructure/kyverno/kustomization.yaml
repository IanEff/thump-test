apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Deliberately no top-level `namespace:` field here (unlike chaos-mesh's
# kustomization) — kustomize's namespace transformer only recognizes a
# fixed built-in list of cluster-scoped kinds, and ClusterPolicy (a CRD
# kind) isn't on it, so a top-level namespace would risk getting stamped
# onto the cluster-scoped verify-thump-images-policy.yaml resource below.
# The chart's own `namespace: kyverno` field (in helmCharts, below) is
# sufficient to land its resources in the right namespace.

resources:
  - verify-thump-images-policy.yaml

helmCharts:
  - name: kyverno
    repo: https://kyverno.github.io/kyverno/
    version: 3.8.2
    releaseName: kyverno
    namespace: kyverno
    includeCRDs: true
    valuesFile: values.yaml
