# Enforce, all four beats signed as of 2026-07-12 (D6 make sign-images
# run). See CLAUDE.md gotcha #17 for the full story and D7(b) in
# ~/Documents/vault/Projects/thump/phase-d-live-payoff-guide.md.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-thump-images
  annotations:
    policies.kyverno.io/title: Verify thump image signatures
    policies.kyverno.io/description: >-
      Enforces ghcr.io/ianeff/thump-* pod images carry a valid keyless
      cosign signature (Fulcio-issued cert, Rekor-logged). See CLAUDE.md
      gotcha #17.
spec:
  validationFailureAction: Enforce
  failurePolicy: Ignore
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-thump-image-signatures
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/ianeff/thump-*"
          # mutateDigest:false was required for Audit mode (mutating the
          # admitted object is unsafe when only auditing). It has to flip
          # to true together with Enforce, not stay false: the real beat
          # Deployments reference images by tag, and validate_image.go
          # treats "no digest in the ref" as an automatic fail regardless
          # of whether the image verified — confirmed live 2026-07-12 via
          # `kyverno apply` against the actual running hiss pod manifest
          # (tag ref): image verification passed (real cosign/Rekor
          # check) but the run still reported fail:1, because nothing had
          # mutated the tag into a digest first. mutateDigest:true lets
          # Enforce mode patch the resolved digest into the pod spec
          # before that check runs, so a genuinely signed tag-referenced
          # image actually passes instead of failing every time.
          mutateDigest: true
          attestors:
            - entries:
                - keyless:
                    subject: "ian.furst@gmail.com"
                    issuer: "https://github.com/login/oauth"
                    rekor:
                      url: https://rekor.sigstore.dev
