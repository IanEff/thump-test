# Static topology map for rattle's TopologySource (see design doc:
# ~/Documents/vault/Projects/ceph-lab/ceph-lab-telemetry-design.md, §1).
#
# This is data only — name/edge, no live state. A future TopologySource
# resolver (in the separate `clank` repo, out of scope here) does live
# per-call lookups keyed off these names to answer DependencyState(dep).
#
# dependsOn edges are wired to match each of the four Sloth SLOs' dependency
# shape 1:1 (applications/infrastructure/sloth/prometheusservicelevels.yaml):
#   ceph-rgw-availability -> ceph-rgw component
#   ceph-osd-latency       -> ceph-osd component
#   ceph-health            -> ceph-cluster component
#   argocd-sync            -> argocd component

# --- Application components (one per SLO subject, plus their dependencies) ---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ceph-rgw
  description: RGW — S3-compatible object gateway. Subject of the ceph-rgw-availability SLO.
spec:
  type: service
  lifecycle: experimental
  owner: thump-test
  dependsOn:
    - resource:default/cephobjectstore
    - component:default/rook-operator
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ceph-osd
  description: OSD read/write path. Subject of the ceph-osd-latency SLO.
spec:
  type: service
  lifecycle: experimental
  owner: thump-test
  dependsOn:
    - resource:default/cephblockpool
    - resource:default/ceph-node-1
    - resource:default/ceph-node-2
    - resource:default/ceph-node-3
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ceph-cluster
  description: Overall Ceph cluster health. Subject of the ceph-health SLO.
spec:
  type: service
  lifecycle: experimental
  owner: thump-test
  dependsOn:
    - resource:default/cephcluster
    - component:default/rook-operator
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: argocd
  description: GitOps continuous delivery — syncs all cluster state from git. Subject of the argocd-sync SLO.
spec:
  type: service
  lifecycle: experimental
  owner: thump-test
  dependsOn:
    - component:default/cilium
    - component:default/rook-operator
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: rook-operator
  description: Rook operator — manages the CephCluster lifecycle.
spec:
  type: service
  lifecycle: experimental
  owner: thump-test
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: cilium
  description: CNI, L2 load-balancing, and Gateway API implementation for the cluster.
spec:
  type: service
  lifecycle: experimental
  owner: thump-test

# --- Storage resources ---
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: cephcluster
  description: The CephCluster CR — the whole Ceph deployment.
spec:
  type: ceph-storage
  owner: thump-test
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: cephblockpool
  description: replicapool — the RBD block pool backing rook-ceph-block (cluster-default StorageClass).
spec:
  type: ceph-storage
  owner: thump-test
  dependsOn:
    - resource:default/cephcluster
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: cephfilesystem
  description: CephFS filesystem (requires the CephFilesystemSubVolumeGroup, gotcha #4).
spec:
  type: ceph-storage
  owner: thump-test
  dependsOn:
    - resource:default/cephcluster
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: cephobjectstore
  description: RGW object store backing the ceph-rgw component.
spec:
  type: ceph-storage
  owner: thump-test
  dependsOn:
    - resource:default/cephcluster

