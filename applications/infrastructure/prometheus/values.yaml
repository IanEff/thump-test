# Full kube-prometheus-stack: Prometheus Operator + Prometheus + Alertmanager
# + kube-state-metrics + node-exporter, all watching monitoring.coreos.com
# CRs (ServiceMonitor/PodMonitor/PrometheusRule). CRDs are NOT installed by
# this chart (crds.enabled: false below) — they're owned by the separate
# prometheus-operator-crds app (wave -6, ahead of this app's wave -5) so
# there's exactly one place in ArgoCD that owns them. Grafana ships bundled
# with this chart too, but stays disabled — applications/infrastructure/grafana/
# is the standalone app of record; keep its datasource URL in sync with
# whatever Service name this release renders (see that app's values.yaml).

crds:
  enabled: false

prometheus:
  prometheusSpec:
    retention: "7d"
    scrapeInterval: 30s
    scrapeTimeout: 10s
    evaluationInterval: 30s

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # No nodeSelector: the control-plane node carries a NoSchedule taint
    # (CLAUDE.md gotcha #14) and Prometheus needs no stable/known node
    # identity — let the scheduler place it on whichever worker has room.

    # Pick up every ServiceMonitor/PodMonitor/PrometheusRule cluster-wide,
    # not just ones carrying this release's chart labels — this is what
    # actually makes ceph-latency-bridge's ServiceMonitor, rook-dashboards'
    # PrometheusRule, and Sloth's generated PrometheusRule (previously all
    # dead CRs — nothing watched monitoring.coreos.com/v1 here before this
    # chart) take effect.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false

    # Targets with no natural ServiceMonitor (no Service/label selector
    # verified live yet) stay as static scrape configs. ceph-latency-bridge's
    # own ServiceMonitor (applications/infrastructure/ceph-latency-bridge/
    # manifests.yaml) replaces what used to be a third static entry here.
    #
    # The last two jobs below (kubernetes-pods / kubernetes-service-endpoints)
    # are a deliberate safety net, not leftover cruft: the old minimal
    # `prometheus` chart shipped these as *default* jobs, and several things
    # in this cluster still rely on their prometheus.io/scrape annotations
    # rather than a ServiceMonitor — confirmed live against the pre-migration
    # cluster's /api/v1/targets before this change: chaos-mesh's 4 components
    # (chaos-controller-manager, chaos-daemon, chaos-dns-server,
    # chaos-dashboard — its chart has no ServiceMonitor support at all, only
    # a bundled standalone-Prometheus option this repo doesn't use) have no
    # other path to being scraped. kube-prometheus-stack does not ship these
    # jobs by default, so without them chaos-mesh's metrics would silently
    # stop being collected on this migration. Everything else that used to
    # ride on annotation-discovery (rook-ceph-mgr/rook-ceph-exporter,
    # cilium-agent/operator/envoy/hubble, node-exporter, kube-state-metrics,
    # coredns) now has a real ServiceMonitor instead (Rook self-creates its
    # own; Cilium's serviceMonitor.enabled flags were flipped on in
    # applications/infrastructure/cilium/values.yaml in this same change;
    # node-exporter/kube-state-metrics/coreDns are chart-bundled component
    # monitors) — those will show up under both mechanisms until/unless the
    # annotations are removed upstream, which is harmless double-scraping,
    # not a correctness issue.
    additionalScrapeConfigs: |
      - job_name: "hubble-metrics"
        static_configs:
          - targets:
              - "hubble-metrics.kube-system.svc.cluster.local:9965"
        relabel_configs:
          - target_label: job
            replacement: hubble

      - job_name: "argocd-metrics"
        static_configs:
          - targets:
              - "argocd-metrics.argocd.svc.cluster.local:8082"
        relabel_configs:
          - target_label: job
            replacement: argocd-metrics

      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      - job_name: "kubernetes-service-endpoints"
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
            action: replace
            target_label: __scheme__
            regex: (https?)
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: kubernetes_name

  # Prometheus self-scrapes via serviceMonitor.selfMonitor (chart default,
  # left enabled) — no more manual "prometheus-self" static job needed.

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Real Alertmanager, not just Grafana unified alerting — thump needs a real
# Alertmanager API/webhook surface to react to chaos experiments against.
# The chart's default `alertmanager.config` already routes everything to a
# no-op 'null' receiver, so enabling this doesn't start paging anyone by
# itself; add real receivers/routes here once something should consume them.
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

# Standalone Grafana app (applications/infrastructure/grafana/) stays
# authoritative — avoid a second, redundant Grafana.
grafana:
  enabled: false

# k3s bundles the controller-manager/scheduler/etcd/kube-proxy into a single
# binary with no separate kubeadm-style Services these default monitors
# expect — leaving them enabled just produces permanently-down targets and
# alerts. kubeApiServer/coreDns/kubelet stay enabled; k3s exposes normal
# Services/kubelet endpoints for those.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

defaultRules:
  rules:
    etcd: false
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false

# Bundled as this chart's own subcharts now, rather than the old minimal
# `prometheus` chart's — same resource tuning carried forward.
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
